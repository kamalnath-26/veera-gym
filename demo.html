<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Banner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

/*=============================
        CONTACT BANNER
==============================*/

.page-banner{
    position:relative;
    width:100%;
    height:450px;

    background:url("images/another-page-baanner-image.png") center center/cover no-repeat;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;
}

.page-banner::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.65);
}

.page-banner::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
    120deg,
    rgba(0,0,0,.55),
    rgba(0,0,0,.20)
    );
}

.banner-content{
    position:relative;
    z-index:10;
    text-align:center;
    color:#fff;
    animation:fadeUp 1s ease;
}

.banner-content h1{
    font-size:70px;
    font-weight:700;
    margin-bottom:15px;
    letter-spacing:1px;
}

.banner-content p{
    margin:0;
}

.breadcrumb-custom{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    font-size:18px;
}

.breadcrumb-custom a{
    color:#fff;
    text-decoration:none;
    transition:.4s;
}

.breadcrumb-custom a:hover{
    color:#ffb703;
}

.breadcrumb-custom span{
    color:#ffb703;
}

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(50px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:991px){

.page-banner{
height:360px;
}

.banner-content h1{
font-size:50px;
}

}

@media(max-width:768px){

.page-banner{
height:300px;
}

.banner-content h1{
font-size:40px;
}

.breadcrumb-custom{
font-size:16px;
}

}

@media(max-width:576px){

.page-banner{
height:240px;
}

.banner-content h1{
font-size:32px;
}

.breadcrumb-custom{
font-size:15px;
}

}

</style>

</head>

<body>

<section class="page-banner">

<div class="container">

<div class="banner-content">

<h1>Contact</h1>

<div class="breadcrumb-custom">

<a href="#">Home</a>

<i class="bi bi-chevron-right"></i>

<span>Contact</span>

</div>

</div>

</div>

</section>

<script>

window.addEventListener("load",function(){

const banner=document.querySelector(".banner-content");

banner.style.opacity="0";
banner.style.transform="translateY(40px)";

setTimeout(function(){

banner.style.transition=".9s";

banner.style.opacity="1";

banner.style.transform="translateY(0px)";

},200);

});

</script>

</body>
</html>
